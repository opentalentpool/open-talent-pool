services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-otp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-otp}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    networks:
      - app_net

  redis:
    image: redis:7.4-alpine
    environment:
      REDIS_USERNAME: ${REDIS_USERNAME:-otp_mail}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      MAIL_QUEUE_PREFIX: ${MAIL_QUEUE_PREFIX:-otp:mail}
    command: ["/bin/sh", "/usr/local/bin/start-secure-redis.sh"]
    volumes:
      - redis_data:/data
      - ./docker/redis/start-secure-redis.sh:/usr/local/bin/start-secure-redis.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --user \"$${REDIS_USERNAME}\" --pass \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - redis_net

  server:
    image: open-talent-pool-server:local
    build:
      context: .
      target: server
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "4000"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-otp}
      POSTGRES_USER: ${POSTGRES_USER:-otp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_USERNAME: ${REDIS_USERNAME:-otp_mail}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      MAIL_QUEUE_PREFIX: ${MAIL_QUEUE_PREFIX:-otp:mail}
      MAIL_WORKER_CONCURRENCY: ${MAIL_WORKER_CONCURRENCY:-4}
      MAIL_OUTBOX_POLL_INTERVAL_MS: ${MAIL_OUTBOX_POLL_INTERVAL_MS:-5000}
      MAIL_OUTBOX_BATCH_SIZE: ${MAIL_OUTBOX_BATCH_SIZE:-25}
      MAIL_RETRY_MAX_ATTEMPTS: ${MAIL_RETRY_MAX_ATTEMPTS:-5}
      MAIL_RETRY_BASE_DELAY_MS: ${MAIL_RETRY_BASE_DELAY_MS:-60000}
      DEBUG: "false"
      OTP_IN_MEMORY_DB: "false"
      ENABLE_TEST_ROUTES: "false"
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_net
      - redis_net

  alerts:
    image: open-talent-pool-server:local
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "while true; do node alerts-dispatch.js || exit 1; sleep \"${ALERTS_DISPATCH_INTERVAL_SECONDS:-900}\"; done",
      ]
    environment:
      NODE_ENV: "production"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-otp}
      POSTGRES_USER: ${POSTGRES_USER:-otp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_USERNAME: ${REDIS_USERNAME:-otp_mail}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      MAIL_QUEUE_PREFIX: ${MAIL_QUEUE_PREFIX:-otp:mail}
      MAIL_WORKER_CONCURRENCY: ${MAIL_WORKER_CONCURRENCY:-4}
      MAIL_OUTBOX_POLL_INTERVAL_MS: ${MAIL_OUTBOX_POLL_INTERVAL_MS:-5000}
      MAIL_OUTBOX_BATCH_SIZE: ${MAIL_OUTBOX_BATCH_SIZE:-25}
      MAIL_RETRY_MAX_ATTEMPTS: ${MAIL_RETRY_MAX_ATTEMPTS:-5}
      MAIL_RETRY_BASE_DELAY_MS: ${MAIL_RETRY_BASE_DELAY_MS:-60000}
      DEBUG: "false"
      OTP_IN_MEMORY_DB: "false"
      ENABLE_TEST_ROUTES: "false"
    restart: unless-stopped
    networks:
      - app_net
      - redis_net

  mail-worker:
    image: open-talent-pool-server:local
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "mail-worker.js"]
    environment:
      NODE_ENV: "production"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-otp}
      POSTGRES_USER: ${POSTGRES_USER:-otp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_USERNAME: ${REDIS_USERNAME:-otp_mail}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      MAIL_QUEUE_PREFIX: ${MAIL_QUEUE_PREFIX:-otp:mail}
      MAIL_WORKER_CONCURRENCY: ${MAIL_WORKER_CONCURRENCY:-4}
      MAIL_OUTBOX_POLL_INTERVAL_MS: ${MAIL_OUTBOX_POLL_INTERVAL_MS:-5000}
      MAIL_OUTBOX_BATCH_SIZE: ${MAIL_OUTBOX_BATCH_SIZE:-25}
      MAIL_RETRY_MAX_ATTEMPTS: ${MAIL_RETRY_MAX_ATTEMPTS:-5}
      MAIL_RETRY_BASE_DELAY_MS: ${MAIL_RETRY_BASE_DELAY_MS:-60000}
      DEBUG: "false"
      OTP_IN_MEMORY_DB: "false"
      ENABLE_TEST_ROUTES: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('fs'); const payload=JSON.parse(fs.readFileSync('/tmp/mail-worker-health.json','utf8')); const checkedAt=Date.parse(payload.checkedAt||0); process.exit(Number.isNaN(checkedAt)||Date.now()-checkedAt>30000?1:0)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - app_net
      - redis_net

  web:
    image: open-talent-pool-web:local
    build:
      context: .
      target: web
      args:
        VITE_API_URL: ""
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PUBLISHED_PORT:-8080}:80"
    networks:
      - app_net

volumes:
  db_data:
  redis_data:

networks:
  app_net:
    driver: bridge
  redis_net:
    driver: bridge
    internal: true
