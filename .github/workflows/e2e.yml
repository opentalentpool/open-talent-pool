name: E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "server/**"
      - "tests/e2e/**"
      - "playwright.config.*"
      - "vite.config.*"
      - "vitest.*.config.*"
      - "package.json"
      - "server/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm from packageManager
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager.split('+')[0]")" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
